<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MS-150 Training Plan 2026</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f1117; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0f1117; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 99px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const STORAGE_KEY = "ms150-completed-days";

    const weeks = [
      {
        weekNum: 1, dates: "Mar 5 – Mar 11", theme: "Find Your Legs", totalMiles: 40,
        days: [
          { day: "Thu", label: "Mar 5",  type: "ride",  trainer: true,  duration: "45 min", hr: "Z2",    desc: "Steady endurance spin — conversational pace" },
          { day: "Fri", label: "Mar 6",  type: "rest",                                                    desc: "Rest" },
          { day: "Sat", label: "Mar 7",  type: "ride",  trainer: false, miles: 25,                        desc: "Long outdoor ride — push a little past comfort" },
          { day: "Sun", label: "Mar 8",  type: "ride",  trainer: false, miles: 15,                        desc: "Back-to-back intro — easy outdoor pace" },
          { day: "Mon", label: "Mar 9",  type: "rest",                                                    desc: "Rest" },
          { day: "Tue", label: "Mar 10", type: "ride",  trainer: true,  duration: "30 min", hr: "Z1",    desc: "Recovery spin — keep it very easy" },
          { day: "Wed", label: "Mar 11", type: "cross",                                                   desc: "Cross-train 30–45 min (walk, swim, yoga)" },
        ]
      },
      {
        weekNum: 2, dates: "Mar 12 – Mar 18", theme: "Build the Base", totalMiles: 53,
        days: [
          { day: "Thu", label: "Mar 12", type: "rest",                                                    desc: "Rest" },
          { day: "Fri", label: "Mar 13", type: "ride",  trainer: true,  duration: "45 min", hr: "Z2",    desc: "Steady endurance spin" },
          { day: "Sat", label: "Mar 14", type: "ride",  trainer: false, miles: 35,                        desc: "Long ride — first real distance push" },
          { day: "Sun", label: "Mar 15", type: "ride",  trainer: false, miles: 18,                        desc: "Back-to-back — easy pace, tired legs" },
          { day: "Mon", label: "Mar 16", type: "rest",                                                    desc: "Rest" },
          { day: "Tue", label: "Mar 17", type: "ride",  trainer: true,  duration: "30 min", hr: "Z1",    desc: "Easy recovery spin, focus on smooth pedaling" },
          { day: "Wed", label: "Mar 18", type: "cross",                                                   desc: "Cross-train 45 min" },
        ]
      },
      {
        weekNum: 3, dates: "Mar 19 – Mar 25", theme: "Distance Confidence", totalMiles: 65,
        days: [
          { day: "Thu", label: "Mar 19", type: "rest",                                                    desc: "Rest" },
          { day: "Fri", label: "Mar 20", type: "ride",  trainer: true,  duration: "50 min", hr: "Z2–Z3", desc: "Tempo intervals: 10 min Z2 warm-up, 3×8 min Z3, cool down" },
          { day: "Sat", label: "Mar 21", type: "ride",  trainer: false, miles: 45,                        desc: "Long ride — practice nutrition & hydration" },
          { day: "Sun", label: "Mar 22", type: "ride",  trainer: false, miles: 20,                        desc: "Back-to-back — tired legs, steady pace" },
          { day: "Mon", label: "Mar 23", type: "rest",                                                    desc: "Rest" },
          { day: "Tue", label: "Mar 24", type: "ride",  trainer: true,  duration: "30 min", hr: "Z1",    desc: "Recovery spin — flush out the weekend" },
          { day: "Wed", label: "Mar 25", type: "cross",                                                   desc: "Cross-train 45 min" },
        ]
      },
      {
        weekNum: 4, dates: "Mar 26 – Apr 1", theme: "Half Century Week", totalMiles: 80,
        days: [
          { day: "Thu", label: "Mar 26", type: "rest",                                                    desc: "Rest" },
          { day: "Fri", label: "Mar 27", type: "ride",  trainer: true,  duration: "55 min", hr: "Z2",    desc: "Steady endurance spin — get loose for tomorrow" },
          { day: "Sat", label: "Mar 28", type: "ride",  trainer: false, miles: 55,                        desc: "🎯 First metric century — big milestone!" },
          { day: "Sun", label: "Mar 29", type: "ride",  trainer: false, miles: 25,                        desc: "Back-to-back — simulate day 2 legs" },
          { day: "Mon", label: "Mar 30", type: "rest",                                                    desc: "Rest" },
          { day: "Tue", label: "Mar 31", type: "ride",  trainer: true,  duration: "30 min", hr: "Z1",    desc: "Easy spin — active recovery" },
          { day: "Wed", label: "Apr 1",  type: "cross",                                                   desc: "Cross-train 45 min" },
        ]
      },
      {
        weekNum: 5, dates: "Apr 2 – Apr 8", theme: "Century Prep", totalMiles: 95,
        days: [
          { day: "Thu", label: "Apr 2",  type: "rest",                                                    desc: "Rest" },
          { day: "Fri", label: "Apr 3",  type: "ride",  trainer: true,  duration: "60 min", hr: "Z2–Z3", desc: "Tempo intervals: 10 min Z2, 4×8 min Z3, cool down" },
          { day: "Sat", label: "Apr 4",  type: "ride",  trainer: false, miles: 65,                        desc: "Long ride — dial in your pace strategy" },
          { day: "Sun", label: "Apr 5",  type: "ride",  trainer: false, miles: 30,                        desc: "Back-to-back — focus on fueling" },
          { day: "Mon", label: "Apr 6",  type: "rest",                                                    desc: "Rest" },
          { day: "Tue", label: "Apr 7",  type: "ride",  trainer: true,  duration: "30 min", hr: "Z1",    desc: "Easy recovery spin" },
          { day: "Wed", label: "Apr 8",  type: "cross",                                                   desc: "Cross-train 45 min" },
        ]
      },
      {
        weekNum: 6, dates: "Apr 9 – Apr 15", theme: "Peak Week", totalMiles: 105,
        days: [
          { day: "Thu", label: "Apr 9",  type: "rest",                                                    desc: "Rest — you've earned it" },
          { day: "Fri", label: "Apr 10", type: "ride",  trainer: true,  duration: "45 min", hr: "Z2",    desc: "Steady spin — save legs for Saturday" },
          { day: "Sat", label: "Apr 11", type: "ride",  trainer: false, miles: 75,                        desc: "🎯 Full Day 1 simulation — 75 miles!" },
          { day: "Sun", label: "Apr 12", type: "ride",  trainer: false, miles: 30,                        desc: "Back-to-back — tired legs, stay strong" },
          { day: "Mon", label: "Apr 13", type: "rest",                                                    desc: "Rest" },
          { day: "Tue", label: "Apr 14", type: "cross",                                                   desc: "Light cross-train only — no hard effort" },
          { day: "Wed", label: "Apr 15", type: "rest",                                                    desc: "Rest" },
        ]
      },
      {
        weekNum: 7, dates: "Apr 16 – Apr 24", theme: "Taper & Rest", totalMiles: 40,
        days: [
          { day: "Thu", label: "Apr 16", type: "rest",                                                    desc: "Rest" },
          { day: "Fri", label: "Apr 17", type: "ride",  trainer: true,  duration: "30 min", hr: "Z1–Z2", desc: "Easy spin — keep legs moving, nothing hard" },
          { day: "Sat", label: "Apr 18", type: "ride",  trainer: false, miles: 20,                        desc: "Short outdoor shakeout — feel good, no heroics" },
          { day: "Sun", label: "Apr 19", type: "rest",                                                    desc: "Rest" },
          { day: "Mon", label: "Apr 20", type: "ride",  trainer: true,  duration: "20 min", hr: "Z1",    desc: "Very easy spin — just loosen the legs" },
          { day: "Tue", label: "Apr 21", type: "rest",                                                    desc: "Rest" },
          { day: "Wed", label: "Apr 22", type: "ride",  trainer: true,  duration: "15 min", hr: "Z1",    desc: "10–15 min shakeout only — keep it super easy" },
          { day: "Thu", label: "Apr 23", type: "rest",                                                    desc: "Rest — gear prep & sleep" },
          { day: "Fri", label: "Apr 24", type: "rest",                                                    desc: "🌙 Final rest day — hydrate & sleep well" },
        ]
      }
    ];

    const typeConfig = {
      ride:  { label: "RIDE",  dot: "#f97316" },
      rest:  { label: "REST",  dot: "#64748b" },
      cross: { label: "CROSS", dot: "#14b8a6" },
    };

    function TrainingPlan() {
      const [activeWeek, setActiveWeek] = useState(0);
      const [completedDays, setCompletedDays] = useState({});
      const [loaded, setLoaded] = useState(false);

      useEffect(() => {
        try {
          const saved = localStorage.getItem(STORAGE_KEY);
          if (saved) setCompletedDays(JSON.parse(saved));
        } catch (_) {}
        setLoaded(true);
      }, []);

      const week = weeks[activeWeek];

      const toggleDay = (weekIdx, dayIdx) => {
        const key = `${weekIdx}-${dayIdx}`;
        const next = { ...completedDays, [key]: !completedDays[key] };
        setCompletedDays(next);
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(next)); } catch (_) {}
      };

      const resetProgress = () => {
        setCompletedDays({});
        try { localStorage.removeItem(STORAGE_KEY); } catch (_) {}
      };

      const totalMilesPlanned = weeks.reduce((sum, w) =>
        sum + w.days.reduce((s, d) => s + (d.miles || 0), 0), 0);
      const totalDays = weeks.reduce((sum, w) => sum + w.days.length, 0);
      const completedCount = Object.values(completedDays).filter(Boolean).length;

      if (!loaded) return (
        <div style={{ background: "#0f1117", minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center" }}>
          <div style={{ color: "#f97316", fontFamily: "monospace", fontSize: 14 }}>Loading...</div>
        </div>
      );

      return (
        <div style={{ fontFamily: "Georgia, 'Times New Roman', serif", background: "#0f1117", minHeight: "100vh", color: "#e2e8f0" }}>

          {/* Header */}
          <div style={{ background: "linear-gradient(135deg, #1a1f2e 0%, #0f1117 60%)", borderBottom: "1px solid #1e293b", padding: "32px 24px 24px" }}>
            <div style={{ maxWidth: 800, margin: "0 auto" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
                <span style={{ fontSize: 22 }}>🚴</span>
                <span style={{ fontFamily: "monospace", fontSize: 11, letterSpacing: "0.2em", color: "#f97316", textTransform: "uppercase", fontWeight: 700 }}>MS-150 · 2026</span>
              </div>
              <h1 style={{ fontSize: "clamp(28px, 5vw, 44px)", fontWeight: 900, lineHeight: 1.1, letterSpacing: "-0.02em", margin: "0 0 6px", color: "#f1f5f9" }}>
                7-Week Training Plan
              </h1>
              <p style={{ color: "#64748b", fontSize: 14, margin: 0, fontFamily: "monospace" }}>
                Mar 5 → Apr 24 · Event: April 25–26 (75 mi each day)
              </p>

              {/* Stats */}
              <div style={{ display: "flex", gap: 16, marginTop: 24, flexWrap: "wrap", alignItems: "flex-end" }}>
                {[
                  { label: "Weeks", val: "7" },
                  { label: "Outdoor Miles", val: totalMilesPlanned },
                  { label: "Starting Fitness", val: "20 mi" },
                  { label: "Goal", val: "75 + 75 mi" },
                ].map(s => (
                  <div key={s.label} style={{ background: "#1a1f2e", border: "1px solid #1e293b", borderRadius: 8, padding: "10px 18px" }}>
                    <div style={{ fontSize: 11, color: "#475569", letterSpacing: "0.1em", textTransform: "uppercase", fontFamily: "monospace", marginBottom: 2 }}>{s.label}</div>
                    <div style={{ fontSize: 22, fontWeight: 800, color: "#f1f5f9" }}>{s.val}</div>
                  </div>
                ))}

                {/* Progress bar */}
                <div style={{ flex: 1, minWidth: 200 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                    <span style={{ fontSize: 11, color: "#475569", letterSpacing: "0.1em", textTransform: "uppercase", fontFamily: "monospace" }}>
                      Progress — {completedCount}/{totalDays} days
                    </span>
                    {completedCount > 0 && (
                      <button onClick={resetProgress} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 10, color: "#475569", fontFamily: "monospace", textDecoration: "underline", padding: 0 }}>
                        reset
                      </button>
                    )}
                  </div>
                  <div style={{ background: "#1e293b", borderRadius: 99, height: 8, overflow: "hidden" }}>
                    <div style={{ height: "100%", width: `${(completedCount / totalDays) * 100}%`, background: "linear-gradient(90deg, #f97316, #22c55e)", borderRadius: 99, transition: "width 0.4s ease" }} />
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div style={{ maxWidth: 800, margin: "0 auto", padding: "24px 16px" }}>

            {/* Week tabs */}
            <div style={{ display: "flex", gap: 8, marginBottom: 24, overflowX: "auto", paddingBottom: 4 }}>
              {weeks.map((w, i) => (
                <button key={i} onClick={() => setActiveWeek(i)} style={{
                  flexShrink: 0, padding: "8px 14px", borderRadius: 6,
                  border: activeWeek === i ? "1px solid #f97316" : "1px solid #1e293b",
                  background: activeWeek === i ? "#f97316" : "#1a1f2e",
                  color: activeWeek === i ? "#0f1117" : "#94a3b8",
                  fontWeight: 700, fontSize: 13, cursor: "pointer", fontFamily: "monospace",
                }}>
                  Wk {w.weekNum}
                </button>
              ))}
            </div>

            {/* Week card */}
            <div style={{ background: "#1a1f2e", border: "1px solid #1e293b", borderRadius: 12, overflow: "hidden", marginBottom: 20 }}>

              {/* Week header */}
              <div style={{ padding: "20px 24px", borderBottom: "1px solid #1e293b", display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 12, background: "linear-gradient(90deg, #1e293b 0%, #1a1f2e 100%)" }}>
                <div>
                  <div style={{ fontFamily: "monospace", fontSize: 11, color: "#f97316", letterSpacing: "0.15em", textTransform: "uppercase", marginBottom: 4 }}>Week {week.weekNum} · {week.dates}</div>
                  <div style={{ fontSize: 22, fontWeight: 800, color: "#f1f5f9" }}>{week.theme}</div>
                </div>
                <div style={{ background: "#0f1117", border: "1px solid rgba(249,115,22,0.12)", borderRadius: 8, padding: "8px 16px", textAlign: "center" }}>
                  <div style={{ fontSize: 11, color: "#64748b", fontFamily: "monospace" }}>WEEKEND MILES</div>
                  <div style={{ fontSize: 26, fontWeight: 900, color: "#f97316" }}>{week.totalMiles}</div>
                </div>
              </div>

              {/* Days */}
              {week.days.map((d, di) => {
                const cfg = typeConfig[d.type];
                const key = `${activeWeek}-${di}`;
                const done = !!completedDays[key];
                return (
                  <div
                    key={di}
                    onClick={() => toggleDay(activeWeek, di)}
                    style={{
                      display: "flex", alignItems: "center", gap: 14, padding: "14px 20px",
                      borderBottom: di < week.days.length - 1 ? "1px solid #0f1117" : "none",
                      cursor: "pointer", background: done ? "#0d1a0d" : "transparent", opacity: done ? 0.7 : 1,
                      transition: "background 0.15s",
                    }}
                    onMouseEnter={e => { if (!done) e.currentTarget.style.background = "#0f1117"; }}
                    onMouseLeave={e => { if (!done) e.currentTarget.style.background = "transparent"; }}
                  >
                    {/* Checkbox */}
                    <div style={{ width: 22, height: 22, borderRadius: 4, border: done ? "2px solid #22c55e" : "2px solid #334155", background: done ? "rgba(34,197,94,0.12)" : "transparent", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, fontSize: 13, color: "#22c55e" }}>
                      {done ? "✓" : ""}
                    </div>

                    {/* Day */}
                    <div style={{ width: 38, flexShrink: 0 }}>
                      <div style={{ fontWeight: 800, fontSize: 14, color: "#f1f5f9", fontFamily: "monospace" }}>{d.day}</div>
                      <div style={{ fontSize: 10, color: "#475569", fontFamily: "monospace" }}>{d.label}</div>
                    </div>

                    {/* Badge */}
                    <div style={{ flexShrink: 0, width: 50, textAlign: "center", padding: "2px 4px", borderRadius: 4, fontSize: 10, fontWeight: 800, letterSpacing: "0.1em", fontFamily: "monospace", color: cfg.dot, border: `1px solid ${cfg.dot}40`, background: `${cfg.dot}15` }}>
                      {cfg.label}
                    </div>

                    {/* Metric */}
                    {d.trainer === true ? (
                      <div style={{ flexShrink: 0, width: 80, lineHeight: 1.3 }}>
                        <div style={{ fontWeight: 900, fontSize: 13, color: "#f97316", fontFamily: "monospace" }}>{d.duration}</div>
                        {d.hr && <div style={{ fontSize: 10, color: "#94a3b8", fontFamily: "monospace" }}>{d.hr}</div>}
                      </div>
                    ) : d.miles ? (
                      <div style={{ flexShrink: 0, width: 80, fontWeight: 900, fontSize: 16, color: "#f97316", fontFamily: "monospace" }}>{d.miles} mi</div>
                    ) : (
                      <div style={{ width: 80, flexShrink: 0 }} />
                    )}

                    {/* Desc */}
                    <div style={{ fontSize: 13, color: done ? "#475569" : "#94a3b8", flex: 1, textDecoration: done ? "line-through" : "none" }}>
                      {d.desc}
                    </div>
                  </div>
                );
              })}
            </div>

            {/* HR Zone tips */}
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))", gap: 12, marginBottom: 20 }}>
              {[
                { icon: "💚", title: "Z1 — Recovery",  tip: "50–65% max HR. Full conversation, barely breathing harder. Trainer recovery days." },
                { icon: "🟡", title: "Z2 — Endurance", tip: "65–75% max HR. Can speak in full sentences. Base trainer pace & long ride effort." },
                { icon: "🟠", title: "Z3 — Tempo",     tip: "75–85% max HR. A few words only. Used in interval blocks on Friday trainer sessions." },
                { icon: "💧", title: "Fueling",        tip: "Eat every 45–60 min on long rides. Train your gut now, not on race day." },
              ].map(t => (
                <div key={t.title} style={{ background: "#1a1f2e", border: "1px solid #1e293b", borderRadius: 8, padding: "14px 16px" }}>
                  <div style={{ fontSize: 18, marginBottom: 6 }}>{t.icon}</div>
                  <div style={{ fontWeight: 700, fontSize: 13, color: "#f1f5f9", marginBottom: 4 }}>{t.title}</div>
                  <div style={{ fontSize: 12, color: "#64748b", lineHeight: 1.5 }}>{t.tip}</div>
                </div>
              ))}
            </div>

            {/* Event banner */}
            <div style={{ background: "linear-gradient(135deg, #1a1f2e, #0f1a0d)", border: "1px solid rgba(34,197,94,0.18)", borderRadius: 12, padding: "20px 24px", textAlign: "center" }}>
              <div style={{ fontSize: 13, color: "#22c55e", fontFamily: "monospace", letterSpacing: "0.15em", marginBottom: 8 }}>🚩 EVENT DAY</div>
              <div style={{ fontSize: 28, fontWeight: 900, color: "#f1f5f9" }}>April 25–26, 2026</div>
              <div style={{ fontSize: 13, color: "#64748b", marginTop: 6 }}>Day 1: 75 miles &nbsp;·&nbsp; Day 2: 75 miles &nbsp;·&nbsp; You've got this.</div>
            </div>

            {/* Legend */}
            <div style={{ display: "flex", gap: 16, marginTop: 16, justifyContent: "center", flexWrap: "wrap" }}>
              {Object.entries(typeConfig).map(([, cfg]) => (
                <div key={cfg.label} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, color: "#64748b" }}>
                  <div style={{ width: 8, height: 8, borderRadius: "50%", background: cfg.dot }} />
                  <span style={{ fontFamily: "monospace" }}>{cfg.label}</span>
                </div>
              ))}
              <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, color: "#64748b" }}>
                <div style={{ width: 8, height: 8, borderRadius: "50%", background: "#22c55e" }} />
                <span style={{ fontFamily: "monospace" }}>DONE</span>
              </div>
            </div>

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<TrainingPlan />);
  </script>
</body>
</html>
